<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DevOps Guardian</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    width: 450px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}
h1 {
    text-align: center;
}
textarea {
    width: 100%;
    height: 120px;
    border-radius: 10px;
    padding: 10px;
    border: none;
    background: #020617;
    color: white;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
button:hover {
    background: #16a34a;
}
.result {
    margin-top: 20px;
    padding: 15px;
    background: #020617;
    border-radius: 10px;
}
.link {
    display: block;
    margin-top: 10px;
    color: #38bdf8;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 DevOps Guardian</h1>
    <p style="text-align:center;">AI-powered Error Fixer</p>

    <textarea id="log" placeholder="Paste error here..."></textarea>

    <button onclick="send()">Analyze</button>

    <div class="result" id="output">Result will appear here...</div>
</div>

<script>
async function send() {
    const log = document.getElementById("log").value;
    const output = document.getElementById("output");

    output.innerHTML = "⏳ Analyzing...";

    try {
        const res = await fetch("https://devopsguardian.onrender.com/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                log: log,
                source: "frontend"
            })
        });

        const data = await res.json();
        console.log("API DATA:", data);

        if (data.status === "success") {
            output.innerHTML = `
                <b>🧠 Error Type:</b> ${data.error_type || "N/A"} <br><br>
                <b>🛠 Fix:</b><br>${data.fix || "No fix returned"} <br><br>
                <b>🔁 Attempts:</b> ${data.attempts || "N/A"} <br><br>

                ${data.github_issue && data.github_issue.startsWith("http")
                    ? `<a href="${data.github_issue}" target="_blank">🐞 View GitHub Issue</a><br>`
                    : `<span>🐞 GitHub Issue: Not created</span><br>`}

                ${data.github_pr && data.github_pr.startsWith("http")
                    ? `<a href="${data.github_pr}" target="_blank">🚀 View GitHub PR</a>`
                    : `<span>🚀 GitHub PR: Not created</span>`}
            `;
        } else {
            output.innerHTML = `❌ ${data.message || "Failed to analyze error"}`;
        }

    } catch (err) {
        console.log("FETCH ERROR:", err);
        output.innerHTML = `❌ Failed to connect backend`;
    }
}
</script>

</body>
</html>
